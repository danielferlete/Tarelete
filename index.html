<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tarelete</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;overflow-x:hidden}
#login-screen{position:fixed;inset:0;background:#f5f5f3;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.login-card{background:#fff;border-radius:16px;border:0.5px solid #e0e0e0;padding:2rem 2.5rem;text-align:center;max-width:340px;width:90%}
.login-title{font-size:18px;font-weight:500;margin-bottom:6px}.login-sub{font-size:13px;color:#888;margin-bottom:1.5rem}
.google-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;border-radius:8px;border:0.5px solid #ddd;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#1a1a1a;justify-content:center}
.google-btn:hover{background:#f9f9f9}
#login-error{font-size:12px;color:#dc2626;margin-top:12px;display:none}
.nav{display:flex;align-items:center;border-bottom:0.5px solid #e0e0e0;background:#fff;padding:0 1.5rem;position:sticky;top:0;z-index:50;gap:0}
.nav-logo{height:72px;object-fit:contain;padding:8px 0;margin-right:8px;mix-blend-mode:multiply}
.nav-tab{font-size:13px;padding:12px 16px;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap;height:100%;display:flex;align-items:center}
.nav-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.nav-tab:hover{color:#1a1a1a}.nav-spacer{flex:1}
.nav-user{display:flex;align-items:center;gap:8px;font-size:12px;color:#888;padding:0 4px}
.nav-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover}
.nav-signout{font-size:12px;color:#aaa;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px}
.nav-signout:hover{background:#f0f0f0;color:#1a1a1a}
.page{display:none;padding:1.5rem;max-width:780px;margin:0 auto}.page.active{display:block}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.title{font-size:20px;font-weight:500}.hbtns{display:flex;gap:6px;flex-wrap:wrap}
.btn{font-size:13px;padding:6px 13px;border-radius:8px;border:0.5px solid #ccc;background:transparent;color:#1a1a1a;cursor:pointer;white-space:nowrap}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#dbeafe;color:#1e40af;border-color:#bfdbfe}.btn-primary:hover{opacity:0.85}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:#ececea;border-radius:8px;padding:10px 12px;cursor:pointer;transition:outline .1s}.stat.active-stat{outline:2px solid #1a1a1a}
.stat-label{font-size:11px;color:#666;margin-bottom:4px}.stat-val{font-size:22px;font-weight:500}
.filter-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;min-width:78px}
.chip{font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid #ddd;background:transparent;color:#666;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.chip.active{background:#fff;border-color:#aaa;color:#1a1a1a;font-weight:500}
.sort-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.sort-label{font-size:12px;color:#999}
.sort-btn{font-size:12px;padding:4px 10px;border-radius:8px;border:0.5px solid #ddd;background:transparent;color:#666;cursor:pointer}
.sort-btn.active{background:#fff;border-color:#aaa;color:#1a1a1a;font-weight:500}
.task-list{display:flex;flex-direction:column;gap:8px}
.task-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .15s;border-left:4px solid #e0e0e0}
.task-card:hover{border-color:#bbb}.task-card.done .task-name{text-decoration:line-through;color:#aaa}.task-card.done{opacity:.6}
.task-top{display:flex;align-items:flex-start;gap:10px}
.check{width:18px;height:18px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.task-name{font-size:14px;font-weight:500;color:#1a1a1a;flex:1;line-height:1.4}
.task-meta{display:flex;gap:6px;align-items:center;margin-top:5px;margin-left:28px;flex-wrap:wrap}
.meta-item{font-size:12px;color:#666}.sep{font-size:12px;color:#ccc}
.company-tag{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:500}
.resp-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#555}
.resp-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.overdue-label{color:#dc2626}.today-label{color:#d97706}
.empty{text-align:center;padding:2rem 1rem;color:#aaa;font-size:13px}
.duration-bar{height:3px;border-radius:2px;margin-top:6px;margin-left:28px;background:#e0e0e0;overflow:hidden}
.duration-fill{height:100%;border-radius:2px}
.checklist-summary{font-size:11px;padding:2px 7px;border-radius:10px;background:#f3f4f6;color:#374151;white-space:nowrap}
.checklist-summary.done-all{background:#d1fae5;color:#065f46}
.card-checklist{margin-top:8px;margin-left:28px;display:flex;flex-direction:column;gap:4px}
.card-cl-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#444}
.card-cl-item.checked{color:#aaa;text-decoration:line-through}
.card-cl-box{width:13px;height:13px;border-radius:3px;border:1.5px solid #ccc;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px}
.card-cl-box.checked{background:#22c55e;border-color:#22c55e;color:#fff}
.concluded-bar{display:flex;align-items:center;gap:10px;margin-top:1.5rem;padding:10px 14px;background:#fff;border:0.5px solid #e0e0e0;border-radius:10px;cursor:pointer}
.concluded-bar:hover{border-color:#aaa}.concluded-bar-label{font-size:13px;color:#666;flex:1}
.concluded-bar-count{font-size:12px;background:#ececea;padding:2px 8px;border-radius:10px;color:#666}
.chevron{font-size:11px;color:#aaa;transition:transform .2s}.chevron.open{transform:rotate(180deg)}
.concluded-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.reun-card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border-left:4px solid #7F77DD;transition:border-color .15s}
.reun-card:hover{border-color:#bbb}.reun-card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.reun-badge{font-size:11px;padding:2px 7px;border-radius:10px;background:#f3f0ff;color:#5b21b6;font-weight:500}
.gcal-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:8px;background:#e8f5e9;color:#2e7d32;border:0.5px solid #a5d6a7;cursor:pointer;text-decoration:none;margin-top:6px}
.gcal-btn:hover{background:#c8e6c9}
.reun-participant-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:0.5px solid #ddd;background:transparent;cursor:pointer;font-size:12px;color:#666;white-space:nowrap;margin:2px}
.reun-participant-chip.selected{background:#dbeafe;border-color:#93c5fd;color:#1e40af;font-weight:500}
.drawer-overlay{position:fixed;inset:0;z-index:150;pointer-events:none}
.drawer-overlay.open{pointer-events:auto}
.drawer-scrim{position:absolute;inset:0;background:rgba(0,0,0,.2);opacity:0;transition:opacity .25s}
.drawer-overlay.open .drawer-scrim{opacity:1}
.drawer{position:absolute;top:0;right:0;width:340px;max-width:95vw;height:100%;background:#fff;border-left:0.5px solid #e0e0e0;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.drawer-overlay.open .drawer{transform:translateX(0)}
.drawer-header{padding:14px 18px;border-bottom:0.5px solid #eee;flex-shrink:0;position:relative}
.drawer-task-name{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:3px;line-height:1.3;padding-right:24px}
.drawer-task-meta{font-size:12px;color:#888}.drawer-task-desc{font-size:12px;color:#888;margin-top:4px;line-height:1.4;display:none}
.drawer-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:#aaa}
.drawer-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.chat-messages{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:90%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.5;background:#dbeafe;color:#1e3a5f;border-bottom-right-radius:3px;align-self:flex-end}
.chat-msg-author{font-size:10px;font-weight:500;color:#1e40af;margin-bottom:3px}
.chat-msg-meta{font-size:10px;color:#aaa;margin-top:3px;text-align:right}
.chat-del{background:none;border:none;cursor:pointer;font-size:10px;color:#aaa;margin-left:6px}.chat-del:hover{color:#dc2626}
.chat-input-row{padding:12px 18px;border-top:0.5px solid #eee;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-textarea{flex:1;resize:none;border:0.5px solid #ccc;border-radius:10px;padding:8px 10px;font-size:13px;font-family:inherit;line-height:1.4;max-height:100px;overflow-y:auto}
.chat-textarea:focus{outline:none;border-color:#93c5fd}
.chat-send{padding:8px 14px;border-radius:8px;background:#dbeafe;color:#1e40af;border:none;cursor:pointer;font-size:13px;font-weight:500}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal{background:#fff;border-radius:14px;border:0.5px solid #e0e0e0;padding:0;width:100%;max-width:480px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.modal-tabs-row{display:flex;border-bottom:0.5px solid #eee;flex-shrink:0;overflow-x:auto}
.modal-tab{font-size:13px;padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap}
.modal-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.modal-body{padding:1.25rem;overflow-y:auto;flex:1}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1rem;color:#1a1a1a}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;color:#666;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 10px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit}
.form-input:focus{outline:none;border-color:#93c5fd}
textarea.form-input{resize:vertical;min-height:60px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.del-btn{font-size:12px;color:#dc2626;border:none;background:none;cursor:pointer;margin-right:auto;padding:0}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;border:0.5px solid #eee;margin-bottom:6px;background:#fafafa}
.list-item-name{font-size:13px;font-weight:500;color:#1a1a1a}
.list-item-sub{font-size:12px;color:#888;margin-top:2px}
.list-item-del{font-size:12px;color:#dc2626;border:none;background:none;cursor:pointer;padding:0;flex-shrink:0}
.divider{border:none;border-top:0.5px solid #eee;margin:1rem 0}
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .1s}
.color-swatch:hover{transform:scale(1.15)}.color-swatch.selected{border-color:#1a1a1a}
.cl-item-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.cl-item-input{flex:1;padding:6px 8px;border-radius:6px;border:0.5px solid #ccc;font-size:13px;font-family:inherit}
.cl-item-input:focus{outline:none;border-color:#93c5fd}
.cl-remove{background:none;border:none;cursor:pointer;color:#aaa;font-size:16px;padding:0 4px;line-height:1}
.cl-remove:hover{color:#dc2626}
.add-cl-btn{font-size:12px;color:#1e40af;background:none;border:none;cursor:pointer;padding:0;margin-top:4px}
.log-item{padding:10px 12px;border-radius:8px;background:#fff;border:0.5px solid #eee;margin-bottom:6px}
.log-item-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.log-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.log-badge.created{background:#d1fae5;color:#065f46}.log-badge.edited{background:#dbeafe;color:#1e40af}
.log-badge.deleted{background:#fee2e2;color:#991b1b}.log-badge.comment{background:#f3f0ff;color:#5b21b6}
.log-badge.checklist{background:#fef3c7;color:#92400e}
.log-time{font-size:11px;color:#aaa}.log-user{font-size:11px;color:#666;font-weight:500}
.log-detail{font-size:12px;color:#555;line-height:1.4}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.cal-controls{display:flex;align-items:center;gap:8px}.cal-title{font-size:16px;font-weight:500}
.cal-nav{font-size:13px;padding:5px 12px;border-radius:8px;border:0.5px solid #ccc;background:transparent;cursor:pointer}
.cal-nav:hover{background:#f0f0f0}.cal-filter-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-name{font-size:11px;color:#999;text-align:center;padding:4px 0;text-transform:uppercase}
.cal-cell{min-height:80px;border-radius:8px;background:#fff;border:0.5px solid #e8e8e8;padding:5px;vertical-align:top;cursor:pointer;transition:border-color .15s}
.cal-cell:hover{border-color:#bbb}.cal-cell.other-month{background:#f9f9f9;opacity:.45;cursor:default}
.cal-cell.is-today{border-color:#f59e0b;border-width:1.5px}
.cal-date{font-size:11px;font-weight:500;color:#888;margin-bottom:3px}
.cal-cell.is-today .cal-date{color:#d97706}
.cal-chip{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;color:#fff;font-weight:500;display:flex;align-items:center;gap:3px}
.cal-chip-resp{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.6)}
.cal-span{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;cursor:pointer;color:#fff;font-weight:500;display:flex;align-items:center;gap:3px;opacity:.85}
.cal-span.span-start{border-radius:4px 0 0 4px}.cal-span.span-mid{border-radius:0}.cal-span.span-end{border-radius:0 4px 4px 0}
.day-task-item{padding:10px 12px;border-radius:10px;border:0.5px solid #e0e0e0;background:#fff;margin-bottom:8px;cursor:pointer;border-left:4px solid #e0e0e0}
.day-task-item:hover{border-color:#bbb}.day-task-name{font-size:13px;font-weight:500;color:#1a1a1a}
.day-task-meta{font-size:11px;color:#888;margin-top:3px}
.tooltip-wrap{position:relative;display:inline-block}
.tooltip-wrap .tooltip-text{visibility:hidden;opacity:0;background:#1a1a1a;color:#fff;font-size:11px;border-radius:6px;padding:4px 8px;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);white-space:nowrap;transition:opacity .15s;pointer-events:none;z-index:300}
.tooltip-wrap:hover .tooltip-text{visibility:visible;opacity:1}
@media(max-width:600px){.cal-cell{min-height:50px;padding:3px}.cal-chip,.cal-span{font-size:9px}.hbtns .btn{font-size:12px;padding:5px 8px}.drawer{width:100%;max-width:100vw;border-left:none}}
</style>
</head>
